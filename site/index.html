<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servette — It's working.</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #555;
      --green:   #4ade80;
      --red:     #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
    }

    .header {
      margin-bottom: 3rem;
      opacity: 0;
      animation: rise 0.6s ease forwards;
    }

    .servette-logo {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 3rem;
      letter-spacing: 0;
      color: var(--text);
      line-height: 1;
    }

    .servette-logo .ette   { color: #5A8466; }
    .servette-logo .cursor { color: inherit; animation: servette-blink 1.1s steps(1) infinite; }

    @keyframes servette-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    .tagline {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 0.5rem;
      animation: pulse 2s ease infinite;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .dot.red { background: var(--red); animation: none; }

    /* ── Verified card ── */
    .verified {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
      opacity: 0;
      animation: rise 0.5s ease 0.2s forwards;
    }

    .verified-header {
      background: var(--surface);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .verified-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .verified-value {
      font-size: 0.9rem;
      color: var(--text);
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-green { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .badge-red   { background: rgba(248,113,113,0.12); color: var(--red);  border: 1px solid rgba(248,113,113,0.2); }

    /* ── What Servette provides ── */
    .provides {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
      opacity: 0;
      animation: rise 0.5s ease 0.35s forwards;
    }

    .provides-title {
      background: var(--surface);
      padding: 0.75rem 1.25rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .provides-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
    }

    .provides-table td {
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .provides-table tr:last-child td { border-bottom: none; }

    .ptd-name {
      width: 1px;
      white-space: nowrap;
      padding-right: 1.5rem;
      font-size: 0.8rem;
      color: var(--text);
    }

    .ptd-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .cs {
      display: inline-block;
      width: 1.1em;
      text-align: center;
      font-weight: 500;
    }

    .cs-pass    { color: var(--green); }
    .cs-fail    { color: var(--red); }
    .cs-defer   { color: var(--muted); }
    .cs-pending { color: var(--muted); }

    /* ── Footer ── */
    .note {
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.7;
      opacity: 0;
      animation: rise 0.5s ease 0.5s forwards;
    }

    .note a { color: #60a5fa; text-decoration: none; }
    .note a:hover { text-decoration: underline; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="servette-logo">Serv<span class="ette">ette</span><span class="cursor">_</span></div>
    <div class="tagline" id="tagline">
      <span class="dot" id="dot"></span><span id="tagline-text">checking...</span>
    </div>
  </div>

  <div class="verified">
    <div class="verified-header">
      <div>
        <div class="verified-label">Connection</div>
        <div class="verified-value" id="url">—</div>
      </div>
      <div class="badge" id="badge">—</div>
    </div>
  </div>

  <div class="provides">
    <div class="provides-title">Live verification<span id="checks-summary"></span></div>
    <table class="provides-table" id="checks-table"></table>
  </div>

  <div class="note">
    This page was served by <a href="https://github.com/andy-emerson/servette">Servette</a> — a simple, secure, static-site server. The checks above run live in your browser; greyed items can't be observed client-side and are verified in the <a href="https://github.com/andy-emerson/servette/blob/main/tests/test.py">test suite</a> instead.
  </div>

</div>

<script>
  const $ = (id) => document.getElementById(id);

  // ── Connection card ───────────────────────────────────────────────
  const isHttps = location.protocol === 'https:';
  $('url').textContent = location.protocol + '//' + location.host;

  if (isHttps) {
    $('badge').textContent = '✓ Verified encrypted';
    $('badge').className    = 'badge badge-green';
    $('tagline-text').textContent = 'YOUR NANOSERVER IS RUNNING';
  } else {
    $('badge').textContent = '⚠ Not encrypted';
    $('badge').className    = 'badge badge-red';
    $('dot').className      = 'dot red';
    $('tagline-text').textContent = 'Connection is not secure';
  }

  // ── Live verification ─────────────────────────────────────────────
  // Each check returns true (pass), false (fail), or null (can't be
  // determined from the browser — reported honestly, never faked).
  const here = location.href.split('#')[0];

  let _hdrs = null;
  const H = async () => (_hdrs ||= (await fetch(here, { cache: 'no-store' })).headers);

  const checks = [
    { name: 'Clickjacking blocked',
      desc: 'Refuses to render in a frame (X-Frame-Options: DENY).',
      run: async () => (await H()).get('X-Frame-Options') === 'DENY' },

    { name: 'MIME-sniffing blocked',
      desc: 'Browsers honor the declared type (X-Content-Type-Options: nosniff).',
      run: async () => (await H()).get('X-Content-Type-Options') === 'nosniff' },

    { name: 'Referrer hidden',
      desc: 'Your URL is not leaked to other sites (Referrer-Policy).',
      run: async () => !!(await H()).get('Referrer-Policy') },

    { name: 'Content-Security-Policy',
      desc: 'Restricts what the page is allowed to load and run.',
      run: async () => !!(await H()).get('Content-Security-Policy') },

    { name: 'Permissions-Policy',
      desc: 'Disables powerful browser features by default.',
      run: async () => !!(await H()).get('Permissions-Policy') },

    { name: 'Cached with ETag',
      desc: 'Sends Cache-Control and a content fingerprint.',
      run: async () => { const h = await H(); return !!h.get('ETag') && !!h.get('Cache-Control'); } },

    { name: '304 Not Modified',
      desc: 'A matching ETag returns an empty 304 instead of a re-download.',
      run: async () => {
        const etag = (await H()).get('ETag');
        if (!etag) return null;
        const r = await fetch(here, { cache: 'no-store', headers: { 'If-None-Match': etag } });
        return r.status === 304 ? true : null;   // browser cache layers vary
      } },

    { name: 'Writes rejected (405)',
      desc: 'A static server has nowhere to put data, so POST returns 405.',
      run: async () => (await fetch(here, { method: 'POST' })).status === 405 },

    { name: 'Unknown paths (404)',
      desc: 'Missing files return a clean 404, never a stack trace.',
      run: async () => (await fetch('/__servette_probe_' + Date.now())).status === 404 },

    { name: 'Path traversal blocked',
      desc: 'Encoded ../ escapes are refused with 403, never served.',
      run: async () => (await fetch('/%2e%2e%2f%2e%2e%2fetc%2fpasswd')).status === 403 },

    { name: 'Forces HTTPS (HSTS)',
      desc: 'Tells browsers to refuse plain HTTP. Active only with a domain certificate.',
      run: async () => (await H()).get('Strict-Transport-Security') ? true : null },

    // Real, but not observable from inside the browser — verified by the
    // test suite (tests/test.py) rather than faked here.
    { name: 'Gzip compression', tested: true,
      desc: 'The browser decompresses transparently and hides Content-Encoding.' },
    { name: 'HTTP → HTTPS redirect', tested: true,
      desc: 'Mixed-content rules block probing port 80 from an HTTPS page.' },
    { name: 'Rate limiting', tested: true,
      desc: 'Skipped live — exercising it would throttle your own visit.' },
    { name: 'Password protection', tested: true,
      desc: 'Off on this demo; verifying it would need credentials.' },
  ];

  const ICON  = { pass: '✓', fail: '✗', defer: '–', pending: '·' };
  const table = $('checks-table');

  function addRow(c) {
    const status = document.createElement('span');
    status.className = 'cs cs-pending';
    status.textContent = ICON.pending;

    const name = document.createElement('td');
    name.className = 'ptd-name';
    name.append(status, ' ' + c.name);

    const desc = document.createElement('td');
    desc.className = 'ptd-desc';
    desc.textContent = c.desc;

    const tr = document.createElement('tr');
    tr.append(name, desc);
    table.appendChild(tr);
    return status;
  }

  function paint(el, state, title) {
    el.textContent = ICON[state];
    el.className = 'cs cs-' + state;
    if (title) el.title = title;
  }

  (async () => {
    let live = 0;
    for (const c of checks) {
      const el = addRow(c);
      if (c.tested) { paint(el, 'defer', 'Verified in tests/test.py'); continue; }
      try {
        const res = await c.run();
        if (res === true)       { paint(el, 'pass'); live++; }
        else if (res === false) { paint(el, 'fail', 'Claimed but not observed'); }
        else                    { paint(el, 'defer', 'Not determinable in this browser'); }
      } catch (e) {
        paint(el, 'defer', 'Check could not run');
      }
    }
    $('checks-summary').textContent = ` · ${live} verified live`;
  })();
</script>

</body>
</html>
